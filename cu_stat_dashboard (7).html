<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CU Stat Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0a06;color:#e8d9a0;font-family:Georgia,serif;font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1a1208}
::-webkit-scrollbar-thumb{background:#3a2a10;border-radius:3px}
select,input,button{font-family:Georgia,serif}
input[type=range]{cursor:pointer;width:100%}
input[type=number]::-webkit-inner-spin-button{opacity:1}
optgroup{font-style:normal}
option{color:#e8d9a0;background:#1a1510}

#header{padding:10px 18px;display:flex;align-items:center;gap:16px;border-bottom:2px solid #c8991a;background:rgba(200,153,26,.08)}
#header h1{font-size:16px;font-weight:bold;color:#c8991a;letter-spacing:.04em}
#header p{font-size:11px;color:#7a6f5a}
#faction-badge{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:3px;border:1px solid rgba(200,153,26,.3);color:#c8991a}

#tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3)}
.tab{padding:9px 16px;border:none;background:none;cursor:pointer;font-family:Georgia,serif;font-size:12px;color:#7a6f5a;border-bottom:2px solid transparent;letter-spacing:.05em;text-transform:uppercase}
.tab.active{color:#c8991a;border-bottom-color:#c8991a}

#content{padding:14px;max-width:1080px;margin:0 auto}

.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid-gear{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.4fr);gap:14px}
.grid3s{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.grid2s{display:grid;grid-template-columns:1fr 1fr;gap:7px}

.card{border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 14px;margin-bottom:10px;background:rgba(255,255,255,.03)}
.slabel{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#7a6f5a;margin-bottom:5px}

select.field{background:#1a1510;color:#e8d9a0;border:1px solid rgba(255,255,255,.15);padding:6px 8px;border-radius:4px;font-size:13px;width:100%}
input.field{background:#1a1510;color:#e8d9a0;border:1px solid rgba(255,255,255,.15);padding:5px 8px;border-radius:4px;width:100%}
input.numsmall{width:50px;background:#1a1510;color:#e8d9a0;border:1px solid rgba(255,255,255,.12);padding:3px 5px;border-radius:4px;font-size:12px;text-align:center}
.btn{font-size:11px;color:#7a6f5a;background:transparent;border:1px solid rgba(255,255,255,.12);padding:3px 10px;border-radius:3px;cursor:pointer;margin-top:8px}

.stat-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.stat-name{width:96px;font-size:12px;flex-shrink:0}
.stat-range{flex:1;min-width:0}
.stat-val{width:116px;text-align:right;font-size:12px;flex-shrink:0}
.stat-bold{font-size:14px;font-weight:bold}
.stat-dim{color:rgba(255,255,255,.3);font-size:10px}

.dcard{background:rgba(0,0,0,.3);border-radius:6px;padding:9px 11px}
.dlabel{font-size:10px;color:#7a6f5a;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.dvalue{font-size:18px;font-weight:bold}
.ddriver{font-size:10px;color:rgba(255,255,255,.25);margin-top:2px}

.pt-bar-bg{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:5px}
.pt-bar{height:100%;border-radius:2px;transition:width .1s}

.badge{font-size:11px;padding:2px 7px;border-radius:3px}
.rank-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px}
.bp-cell{background:rgba(0,0,0,.3);border-radius:5px;padding:8px 6px;text-align:center;border:1px solid transparent}
.bp-hi{border-color:rgba(255,255,255,.15)}
.result-box{text-align:center;padding:10px;border-radius:6px;margin-top:8px}
.info-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.chart-wrap{position:relative;width:100%;overflow:hidden}
#tip{position:fixed;background:#1a1510;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:8px 12px;font-size:12px;pointer-events:none;display:none;z-index:100;white-space:nowrap}
</style>
</head>
<body>
<div id="header">
  <h1>⚔ CU STAT DASHBOARD</h1>
  <p>Camelot Unchained · Character Analysis Tool</p>
  <span id="faction-badge">Arthurian</span>
</div>
<div id="tabs">
  <button class="tab active" onclick="showTab(0)">Build Planner</button>
  <button class="tab" onclick="showTab(1)">Race Comparison</button>
  <button class="tab" onclick="showTab(2)">Stat Scaling</button>
  <button class="tab" onclick="showTab(3)">Gear Optimizer</button>
</div>
<div id="content"></div>
<div id="tip"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const RACES=[
  {id:"CaitSith",   name:"Cait Sith",        faction:"Arthurian",b:{Attunement:0,Command:0,Conviction:0,Dexterity:0,Endurance:0,Spirit:0,Strength:0,Vitality:0,Will:0}},
  {id:"Dvergr",     name:"Dvergr",            faction:"Viking",   b:{Attunement:0,Command:0,Conviction:0,Dexterity:0,Endurance:0,Spirit:0,Strength:0,Vitality:4,Will:3}},
  {id:"Firbog",     name:"Firbog",            faction:"TDD",      b:{Attunement:0,Command:0,Conviction:0,Dexterity:0,Endurance:3,Spirit:4,Strength:0,Vitality:0,Will:0}},
  {id:"Golem",      name:"Golem",             faction:"Arthurian",b:{Attunement:0,Command:0,Conviction:3,Dexterity:0,Endurance:4,Spirit:0,Strength:0,Vitality:0,Will:0}},
  {id:"Hamadryad",  name:"Hamadryad",         faction:"TDD",      b:{Attunement:0,Command:0,Conviction:0,Dexterity:0,Endurance:0,Spirit:0,Strength:0,Vitality:0,Will:0}},
  {id:"HumanA",     name:"Human (Arthurian)", faction:"Arthurian",b:{Attunement:2,Command:2,Conviction:2,Dexterity:2,Endurance:2,Spirit:2,Strength:2,Vitality:2,Will:2}},
  {id:"HumanT",     name:"Human (TDD)",       faction:"TDD",      b:{Attunement:2,Command:2,Conviction:2,Dexterity:2,Endurance:2,Spirit:2,Strength:2,Vitality:2,Will:2}},
  {id:"HumanV",     name:"Human (Viking)",    faction:"Viking",   b:{Attunement:2,Command:2,Conviction:2,Dexterity:2,Endurance:2,Spirit:2,Strength:2,Vitality:2,Will:2}},
  {id:"Jotnar",     name:"Jotnar",            faction:"Viking",   b:{Attunement:0,Command:0,Conviction:0,Dexterity:0,Endurance:3,Spirit:0,Strength:4,Vitality:0,Will:0}},
  {id:"Luchorpan",  name:"Luchorpan",         faction:"TDD",      b:{Attunement:0,Command:0,Conviction:3,Dexterity:4,Endurance:0,Spirit:0,Strength:0,Vitality:0,Will:0}},
  {id:"Pict",       name:"Pict",              faction:"Arthurian",b:{Attunement:0,Command:0,Conviction:0,Dexterity:0,Endurance:0,Spirit:0,Strength:0,Vitality:0,Will:0}},
  {id:"Strm",       name:"St'rm",             faction:"Arthurian",b:{Attunement:0,Command:0,Conviction:0,Dexterity:0,Endurance:0,Spirit:0,Strength:0,Vitality:0,Will:0}},
  {id:"Stormrider", name:"Stormrider",        faction:"Arthurian",b:{Attunement:0,Command:0,Conviction:0,Dexterity:0,Endurance:0,Spirit:4,Strength:0,Vitality:0,Will:3}},
  {id:"Valkyrie",   name:"Valkyrie",          faction:"Viking",   b:{Attunement:0,Command:0,Conviction:0,Dexterity:0,Endurance:0,Spirit:0,Strength:0,Vitality:0,Will:0}},
];
const FC={Arthurian:"#cc3f3f",Viking:"#4a9edd",TDD:"#4a9e6a"};
const STATS=["Attunement","Command","Conviction","Dexterity","Endurance","Spirit","Strength","Vitality","Will"];
const SC={Attunement:"#9b6dff",Command:"#ff9940",Conviction:"#ff5577",Dexterity:"#40e0d0",Endurance:"#8ac840",Spirit:"#40c8ff",Strength:"#ff5040",Vitality:"#ff4060",Will:"#d040ff"};
const TOTAL_PTS=130;
const DFN={
  // ── Vitality ──
  "Max HP":           s=>(5000+100*s.Vitality)*(1+s.Vitality*.02),
  "Max Shield":       s=>(5000+100*s.Vitality)*(1+s.Vitality*.02)/2,
  "HP Regen/s":       s=>{const h=(5000+100*s.Vitality)*(1+s.Vitality*.02);return h/150*(1+s.Vitality*.02);},
  // ── Spirit ──
  "Max Mana":         s=>(5000+100*s.Spirit)*(1+s.Spirit*.02),
  "Mana Regen/s":     s=>{const m=(5000+100*s.Spirit)*(1+s.Spirit*.02);return m/500*(1+s.Spirit*.02);},
  "Faith Regen":      s=>10*(1+s.Spirit*.03),
  "Focus Regen %":    s=>(.1+s.Spirit*.005)*100,
  "Determ. Regen":    s=>20*(s.Spirit/100),
  "Courage Degen":    s=>-10*(100/Math.max(s.Spirit,1)),
  // ── Conviction ──
  "Buff Duration x":  s=>1+s.Conviction*.005,
  "Buff Effect x":    s=>1+s.Conviction*.005,
  "Healing x":        s=>1+s.Conviction*.01,
  // ── Endurance ──
  "Debuff Dur x":     s=>1-s.Endurance*.005,
  "Guts Threshold %": s=>.1*(1+s.Endurance*.01)*100,
  "Guts DR %":        s=>.1*(1+s.Endurance*.005)*100,
  "Block Value x":    s=>1+s.Endurance*.01,
  // ── Dexterity ──
  "Evasion %":        s=>s.Dexterity*.002*(1+s.Dexterity*.01)*100,
  // "Base Evasion %":   s=>s.Dexterity*.002*100,
  "Block CD":         s=>4*(1-s.Dexterity*.01),
  // ── Command ──
  "Panic Multiplier":     s=>1+s.Command*.01,
  "Detection Range":  s=>5+s.Command*.75,
  "Veil Resist %":    s=>s.Command*.5,
  // ── Strength ──
  "Melee Damage":     s=>1+s.Strength*.01,
  // ── Will ──
  "Panic Decay":      s=>-5,
  "Panic Resist %":    s=>s.Will*.5,
  // ── Attunement ──
  "Spell Damage":     s=>1+s.Attunement*.01,
  "Prospecting Cap":  s=>100,
  // ── Flat values ──
  "Parry %":          s=>5,
};
const DRIVER={
  "Max HP":"Vitality","HP Regen/s":"Vitality",
  "Max Mana":"Spirit","Mana Regen/s":"Spirit","Faith Regen":"Spirit","Determ. Regen":"Spirit","Focus Regen %":"Spirit","Courage Degen":"Spirit",
  "Buff Duration x":"Conviction","Buff Effect x":"Conviction","Healing x":"Conviction",
  "Panic Multiplier":"Command","Detection Range":"Command","Veil Resist %":"Command",
  "Debuff Dur x":"Endurance","Guts Threshold %":"Endurance","Guts DR %":"Endurance","Block Value x":"Endurance",
  "Evasion %":"Dexterity","Block CD":"Dexterity",
  "Max Shield":"Vitality",
  "Melee Damage":"Strength",
  "Spell Damage":"Attunement",
  "Panic Resist %":"Will",
};
const DGROUPS=[
  {label:"Combat Pool",  keys:["Max HP","Max Mana","Max Shield","HP Regen/s","Mana Regen/s"]},
  {label:"Abilities",    keys:["Buff Duration x","Buff Effect x","Healing x","Faith Regen","Focus Regen %","Determ. Regen","Courage Degen"]},
  {label:"Offense",      keys:["Melee Damage","Spell Damage", "Panic Multiplier"]},
  {label:"Defense",      keys:["Debuff Dur x","Guts Threshold %","Guts DR %","Evasion %", "Block CD", "Block Value x", "Parry %", "Panic Resist %"]},
  {label:"Utility",      keys:["Detection Range","Veil Resist %"]},
];

// ── State ─────────────────────────────────────────────────────────────────────
const zero=()=>Object.fromEntries(STATS.map(s=>[s,0]));
let S={
  tab:0, raceId:"CaitSith", alloc:zero(), gear:zero(),
  cmpAlloc:zero(), cmpDerived:"Max HP",
  scalePrimary:"Vitality", scaleDerived:"Max HP",
  optRaceId:"CaitSith", optAlloc:zero(), optDerived:"Max HP", optTarget:"",
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function getStats(raceId,alloc,gear){
  gear=gear||{};
  const r=RACES.find(x=>x.id===raceId);
  return Object.fromEntries(STATS.map(s=>[s,10+(alloc[s]||0)+(r.b[s]||0)+(gear[s]||0)]));
}
function calcAll(st){return Object.fromEntries(Object.entries(DFN).map(([k,fn])=>[k,fn(st)]));}
function fmt(key,val){
  const v=parseFloat(val);
  if(isNaN(v))return"—";
  if(key==="Max HP"||key==="Max Mana"||key==="Max Shield")return Math.round(v).toLocaleString();
  if(["HP Regen/s","Mana Regen/s","Faith Regen","Determ. Regen","Courage Degen"].includes(key))return v.toFixed(2);
  if(key==="Focus Regen")return v.toFixed(3);
  if(key.endsWith(" x"))return v.toFixed(3)+"x";
  if(key.endsWith(" %"))return v.toFixed(2)+"%";
  if(key==="Detection Range")return v.toFixed(1)+" u";
  if(key==="Guts Multiplier")return v.toFixed(3)+"x";
  if(key==="Panic Decay"||key==="Prospecting Cap")return v.toFixed(0);
  return v.toFixed(2);
}
function hexRgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function showTip(e,t){const el=document.getElementById("tip");el.style.display="block";el.textContent=t;el.style.left=(e.clientX+12)+"px";el.style.top=(e.clientY-28)+"px";}
function hideTip(){document.getElementById("tip").style.display="none";}
document.addEventListener("mousemove",e=>{const el=document.getElementById("tip");if(el.style.display!=="none"){el.style.left=(e.clientX+12)+"px";el.style.top=(e.clientY-28)+"px";}});

// ── SVG Charts ────────────────────────────────────────────────────────────────
function svgBar(data,W,H,lk,vk,colorFn,tipFn){
  const PL=52,PR=10,PT=10,PB=62;
  const cw=W-PL-PR,ch=H-PT-PB;
  const vals=data.map(d=>d[vk]);
  const mn=Math.min(...vals)*.98,mx=Math.max(...vals)*1.02;
  const sy=v=>ch-((v-mn)/(mx-mn||1))*ch;
  let out="";
  for(let i=0;i<=4;i++){
    const v=mn+(mx-mn)*i/4,y=PT+sy(v);
    const l=v>=1000?(Math.round(v/100)/10)+"k":v.toFixed(v<10?2:1);
    out+=`<line x1="${PL}" y1="${y}" x2="${PL+cw}" y2="${y}" stroke="rgba(255,255,255,.07)" stroke-dasharray="2 4"/>
          <text x="${PL-4}" y="${y+4}" text-anchor="end" fill="#7a6f5a" font-size="9" font-family="Georgia,serif">${l}</text>`;
  }
  const bw=Math.max(4,Math.floor(cw/data.length)-3);
  const gap=(cw-bw*data.length)/(data.length+1);
  data.forEach((d,i)=>{
    const x=PL+gap+i*(bw+gap);
    const bh=Math.max(1,((d[vk]-mn)/(mx-mn||1))*ch);
    const col=colorFn(d);
    const tip=(tipFn?tipFn(d):`${d[lk]}: ${d[vk].toLocaleString(undefined,{maximumFractionDigits:2})}`).replace(/'/g,"&#39;");
    out+=`<rect x="${x}" y="${PT+ch-bh}" width="${bw}" height="${bh}" fill="${col}" rx="2"/>
          <text x="${x+bw/2}" y="${H-PB+14}" text-anchor="end" fill="#7a6f5a" font-size="9" font-family="Georgia,serif" transform="rotate(-45,${x+bw/2},${H-PB+14})">${d[lk]}</text>
          <rect x="${x}" y="${PT}" width="${bw}" height="${ch}" fill="transparent" style="cursor:pointer" onmouseenter="showTip(event,'${tip}')" onmouseleave="hideTip()"/>`;
  });
  out+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+ch}" stroke="rgba(255,255,255,.15)"/>`;
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${out}</svg>`;
}

function svgLine(data,W,H,xk,yk,color,refY,xLabel){
  const PL=52,PR=52,PT=10,PB=34;
  const cw=W-PL-PR,ch=H-PT-PB;
  const vals=data.map(d=>d[yk]);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const pad=(mx-mn)*.06;
  const lo=mn-pad,hi=mx+pad;
  const sx=i=>PL+i*(cw/(data.length-1));
  const sy=v=>PT+ch-((v-lo)/(hi-lo||1))*ch;
  let out="";
  for(let i=0;i<=4;i++){
    const v=lo+(hi-lo)*i/4,y=sy(v);
    const l=v>=1000?(Math.round(v/100)/10)+"k":v.toFixed(v<2?3:1);
    out+=`<line x1="${PL}" y1="${y}" x2="${PL+cw}" y2="${y}" stroke="rgba(255,255,255,.07)" stroke-dasharray="2 4"/>
          <text x="${PL-4}" y="${y+4}" text-anchor="end" fill="#7a6f5a" font-size="9" font-family="Georgia,serif">${l}</text>`;
  }
  if(refY!=null&&!isNaN(refY)){
    const ry=sy(refY);
    if(ry>=PT&&ry<=PT+ch){
      const rl=refY>=1000?Math.round(refY).toLocaleString():refY.toFixed(2);
      out+=`<line x1="${PL}" y1="${ry}" x2="${PL+cw}" y2="${ry}" stroke="#ff9940" stroke-dasharray="5 4"/>
            <text x="${PL+cw+4}" y="${ry+4}" fill="#ff9940" font-size="9" font-family="Georgia,serif">Target</text>`;
    }
  }
  const step=Math.ceil(data.length/8);
  const lastStepIdx=Math.floor((data.length-1)/step)*step;
  const lastIdx=data.length-1;
  const tooClose=(lastIdx-lastStepIdx)<Math.ceil(step/2);
  data.forEach((d,i)=>{
    const isStep=i%step===0;
    const isLast=i===lastIdx;
    const skipThisStep=isStep&&(i===lastStepIdx)&&tooClose;
    if((isStep&&!skipThisStep)||isLast)
      out+=`<text x="${sx(i)}" y="${PT+ch+14}" text-anchor="middle" fill="#7a6f5a" font-size="9" font-family="Georgia,serif">${d[xk]}</text>`;
  });
  if(xLabel)out+=`<text x="${PL+cw/2}" y="${H-2}" text-anchor="middle" fill="#7a6f5a" font-size="9" font-family="Georgia,serif">${xLabel}</text>`;
  const pts=data.map((d,i)=>`${i===0?"M":"L"}${sx(i).toFixed(1)},${sy(d[yk]).toFixed(1)}`).join(" ");
  out+=`<path d="${pts}" fill="none" stroke="${color}" stroke-width="2"/>`;
  data.forEach((d,i)=>{
    const tv=d[yk]>=1000?Math.round(d[yk]).toLocaleString():d[yk].toFixed(3);
    const tip=`${d[xk]}: ${tv}`.replace(/'/g,"&#39;");
    out+=`<rect x="${sx(i)-6}" y="${PT}" width="12" height="${ch}" fill="transparent" style="cursor:crosshair" onmouseenter="showTip(event,'${tip}')" onmouseleave="hideTip()"/>`;
  });
  out+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+ch}" stroke="rgba(255,255,255,.15)"/>`;
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${out}</svg>`;
}

// ── Tab 0: Build Planner ──────────────────────────────────────────────────────
// Key design: sliders are rendered once. oninput calls updateBuildDisplay()
// which patches only text nodes — never touches slider elements.

function buildPlannerHTML(){
  const race=RACES.find(r=>r.id===S.raceId);
  const fc=FC[race.faction];
  const fcRgb=hexRgb(fc);

  let raceOpts="";
  ["Arthurian","Viking","TDD"].forEach(f=>{
    raceOpts+=`<optgroup label="── ${f} ──" style="color:${FC[f]}">`;
    RACES.filter(r=>r.faction===f).forEach(r=>{raceOpts+=`<option value="${r.id}"${r.id===S.raceId?" selected":""}>${r.name}</option>`;});
    raceOpts+="</optgroup>";
  });

  const bonuses=Object.entries(race.b).filter(([,v])=>v>0);
  const badges=bonuses.length
    ?bonuses.map(([k,v])=>`<span class="badge" style="color:${SC[k]};background:${SC[k]}22">+${v} ${k.slice(0,4)}</span>`).join("")
    :`<span style="font-size:11px;color:#7a6f5a">No racial bonuses</span>`;

  let statRows="";
  STATS.forEach(s=>{
    const racial=race.b[s]||0;
    const cur=S.alloc[s]||0;
    const gearB=S.gear[s]||0;
    const total=10+cur+racial+gearB;
    const maxA=40;
    const ptUsed=Object.values(S.alloc).reduce((a,b)=>a+b,0);
    const ptLeft=TOTAL_PTS-ptUsed;
    const maxRange=Math.min(maxA,cur+ptLeft);
    statRows+=`
      <div class="stat-row">
        <span class="stat-name" style="color:${SC[s]}">${s}</span>
        <input type="range" class="stat-range" id="rng-${s}" min="0" max="${maxRange}" value="${cur}"
          style="accent-color:${SC[s]}" oninput="onSlider('${s}',+this.value)"/>
        <span class="stat-val" id="sval-${s}">
          <span class="stat-bold" style="color:${SC[s]}">${total}</span>
          <span class="stat-dim"> 10+${cur}${racial>0?"+"+racial+"r":""}${gearB>0?"+"+gearB+"g":""}</span>
        </span>
      </div>`;
  });

  let gearInputs="";
  STATS.forEach(s=>{
    gearInputs+=`<div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:10px;color:${SC[s]};width:80px;flex-shrink:0">${s}</span>
      <input type="number" class="numsmall" min="0" max="50" value="${S.gear[s]||0}"
        oninput="onGear('${s}',+this.value)"/>
    </div>`;
  });

  const totalStats=getStats(S.raceId,S.alloc,S.gear);
  const derived=calcAll(totalStats);

  function makeGroup(g){
    let cards="";
    g.keys.forEach(k=>{
      const drv=DRIVER[k];
      const accent=drv?SC[drv]:"#e8d9a0";
      cards+=`<div class="dcard">
        <div class="dlabel">${k}</div>
        <div class="dvalue" id="dv-${k.replace(/[^a-z0-9]/gi,"_")}" style="color:${accent}">${fmt(k,derived[k])}</div>
        ${drv?`<div class="ddriver" id="dd-${k.replace(/[^a-z0-9]/gi,"_")}">${drv} (${totalStats[drv]})</div>`:""}
      </div>`;
    });
    return`<div class="card"><div class="slabel">${g.label}</div><div class="grid2s">${cards}</div></div>`;
  }

  const derivedHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">
    <div>${makeGroup(DGROUPS[0])}${makeGroup(DGROUPS[1])}</div>
    <div>${makeGroup(DGROUPS[2])}${makeGroup(DGROUPS[3])}</div>
    <div>${makeGroup(DGROUPS[4])}</div>
  </div>`;

  const ptUsed=Object.values(S.alloc).reduce((a,b)=>a+b,0);
  const ptLeft=TOTAL_PTS-ptUsed;
  const ptPct=Math.min(100,ptUsed/TOTAL_PTS*100);
  const ptColor=ptLeft<0?"#e24b4a":ptLeft===0?"#e8d9a0":"#4a9e6a";

  return`<div class="grid2">
    <div>
      <div class="card" style="border-color:rgba(${fcRgb},.25);background:rgba(${fcRgb},.06)">
        <div class="slabel">Race Selection</div>
        <select class="field" onchange="S.raceId=this.value;S.alloc=zero();renderTab()">
          ${raceOpts}
        </select>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">${badges}</div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:#7a6f5a;text-transform:uppercase;letter-spacing:.06em">Points: <span id="pt-used">${ptUsed}</span> / ${TOTAL_PTS}</span>
          <span id="pt-left" style="font-size:15px;font-weight:bold;color:${ptColor}">${ptLeft} left</span>
        </div>
        <div class="pt-bar-bg"><div class="pt-bar" id="pt-bar" style="width:${ptPct}%;background:${fc}"></div></div>
      </div>
      <div class="card">
        <div class="slabel">Primary Stats</div>
        ${statRows}
        <button class="btn" onclick="S.alloc=zero();renderTab()">Reset points</button>
      </div>
      <div class="card">
        <div class="slabel">Gear Stat Bonuses (total across all slots)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">${gearInputs}</div>
        <button class="btn" onclick="S.gear=zero();renderTab()">Clear gear</button>
      </div>
    </div>
    <div id="derived-panel">${derivedHTML}</div>
  </div>`;
}

// Called on every slider move — updates only text, never the slider itself
function onSlider(s, v){
  const race=RACES.find(r=>r.id===S.raceId);
  const maxA=40;
  const ptUsed=Object.values(S.alloc).reduce((a,b)=>a+b,0);
  const ptLeft=TOTAL_PTS-ptUsed;
  const delta=v-(S.alloc[s]||0);
  if(delta>0&&delta>ptLeft){
    // clamp slider back without re-render
    const el=document.getElementById("rng-"+s);
    if(el) el.value=S.alloc[s]||0;
    return;
  }
  S.alloc[s]=Math.max(0,Math.min(maxA,v));
  updateBuildDisplay();
}

function onGear(s,v){
  S.gear[s]=Math.max(0,Math.min(50,v||0));
  updateBuildDisplay();
}

// Patches only the display nodes — sliders untouched
function updateBuildDisplay(){
  const race=RACES.find(r=>r.id===S.raceId);
  const fc=FC[race.faction];
  const ptUsed=Object.values(S.alloc).reduce((a,b)=>a+b,0);
  const ptLeft=TOTAL_PTS-ptUsed;
  const ptPct=Math.min(100,ptUsed/TOTAL_PTS*100);
  const ptColor=ptLeft<0?"#e24b4a":ptLeft===0?"#e8d9a0":"#4a9e6a";

  // Point counter
  const elUsed=document.getElementById("pt-used");
  const elLeft=document.getElementById("pt-left");
  const elBar =document.getElementById("pt-bar");
  if(elUsed) elUsed.textContent=ptUsed;
  if(elLeft){elLeft.textContent=ptLeft+" left";elLeft.style.color=ptColor;}
  if(elBar){elBar.style.width=ptPct+"%";elBar.style.background=ptLeft<0?"#e24b4a":fc;}

  // Per-stat display + slider max
  STATS.forEach(s=>{
    const racial=race.b[s]||0;
    const cur=S.alloc[s]||0;
    const gearB=S.gear[s]||0;
    const total=10+cur+racial+gearB;
    const maxA=40;
    const newMax=Math.min(maxA,cur+ptLeft);
    const valEl=document.getElementById("sval-"+s);
    if(valEl) valEl.innerHTML=`<span class="stat-bold" style="color:${SC[s]}">${total}</span>`+
      `<span class="stat-dim"> 10+${cur}${racial>0?"+"+racial+"r":""}${gearB>0?"+"+gearB+"g":""}</span>`;
    const rngEl=document.getElementById("rng-"+s);
    if(rngEl) rngEl.max=newMax;
  });

  // Derived stats
  const totalStats=getStats(S.raceId,S.alloc,S.gear);
  const derived=calcAll(totalStats);
  Object.entries(DFN).forEach(([k])=>{
    const id=k.replace(/[^a-z0-9]/gi,"_");
    const vEl=document.getElementById("dv-"+id);
    if(vEl) vEl.textContent=fmt(k,derived[k]);
    const dEl=document.getElementById("dd-"+id);
    const drv=DRIVER[k];
    if(dEl&&drv) dEl.textContent=drv+" ("+totalStats[drv]+")";
  });
}

// ── Tab 1: Race Comparison ────────────────────────────────────────────────────
function raceCmpHTML(){
  const cmpData=buildCmpData();
  let dOpts=Object.keys(DFN).map(d=>`<option${d===S.cmpDerived?" selected":""}>${d}</option>`).join("");
  let aInputs=STATS.map(s=>`
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <span style="font-size:10px;color:${SC[s]}">${s.slice(0,4)}</span>
      <input type="number" class="numsmall" min="0" max="40" value="${S.cmpAlloc[s]||0}"
        oninput="S.cmpAlloc['${s}']=Math.max(0,Math.min(40,+this.value||0));refreshCmpChart()"/>
    </div>`).join("");

  const fRanks=["Arthurian","Viking","TDD"].map(f=>{
    const rows=cmpData.filter(d=>d.faction===f).map(r=>{
      const rank=cmpData.indexOf(r)+1;
      const vs=r.value>=1000?Math.round(r.value).toLocaleString():r.value.toFixed(3);
      return`<div class="rank-row"><span style="color:#7a6f5a">#${rank} ${r.short}</span><span style="color:${FC[f]}">${vs}</span></div>`;
    }).join("");
    return`<div class="card"><div class="slabel" style="color:${FC[f]}">${f}</div>${rows}</div>`;
  }).join("");

  return`<div>
    <div style="display:flex;gap:14px;margin-bottom:14px;align-items:flex-start;flex-wrap:wrap">
      <div style="min-width:180px">
        <div class="slabel">Derived Stat</div>
        <select class="field" style="width:auto" onchange="S.cmpDerived=this.value;renderTab()">${dOpts}</select>
      </div>
      <div style="flex:1">
        <div class="slabel">Shared Point Allocation (applied to all races)</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${aInputs}</div>
      </div>
    </div>
    <div class="card">
      <div class="slabel">All Races — ${S.cmpDerived}</div>
      <div class="chart-wrap" id="cmp-chart">${svgBar(cmpData,680,300,"short","value",d=>FC[d.faction],d=>`${d.short}: ${d.value>=1000?Math.round(d.value).toLocaleString():d.value.toFixed(2)}`)}</div>
    </div>
    <div class="grid3">${fRanks}</div>
  </div>`;
}

function buildCmpData(){
  return RACES.map(r=>{
    const st=getStats(r.id,S.cmpAlloc);
    const fn=DFN[S.cmpDerived];
    return{name:r.name,short:r.name.replace(" (Arthurian)","").replace(" (Viking)","").replace(" (TDD)",""),value:fn?fn(st):0,faction:r.faction};
  }).sort((a,b)=>b.value-a.value);
}

function refreshCmpChart(){
  const el=document.getElementById("cmp-chart");
  if(!el)return;
  const data=buildCmpData();
  el.innerHTML=svgBar(data,680,300,"short","value",d=>FC[d.faction],d=>`${d.short}: ${d.value>=1000?Math.round(d.value).toLocaleString():d.value.toFixed(2)}`);
}

// ── Tab 2: Stat Scaling ───────────────────────────────────────────────────────
function scaleHTML(){
  const avail=Object.keys(DFN).filter(d=>DRIVER[d]===S.scalePrimary);
  if(!avail.includes(S.scaleDerived)) S.scaleDerived=avail[0]||S.scaleDerived;
  let pOpts=STATS.map(s=>`<option${s===S.scalePrimary?" selected":""}>${s}</option>`).join("");
  let dOpts=avail.map(d=>`<option${d===S.scaleDerived?" selected":""}>${d}</option>`).join("");
  const fn=DFN[S.scaleDerived];
  const lineData=Array.from({length:41},(_,i)=>i+10).map(v=>{
    const b=Object.fromEntries(STATS.map(s=>[s,10]));b[S.scalePrimary]=v;
    return{stat:v,value:fn?fn(b):0};
  });
  const bps=[10,15,20,25,30,35,40,45,50];
  const bpCells=bps.map(v=>{
    const b=Object.fromEntries(STATS.map(s=>[s,10]));b[S.scalePrimary]=v;
    const val=fn?fn(b):0;
    const hi=v===50;
    return`<div class="bp-cell${hi?" bp-hi":""}" style="${hi?"background:"+SC[S.scalePrimary]+"22;border-color:"+SC[S.scalePrimary]+"55":""}">
      <div style="color:${SC[S.scalePrimary]};font-size:13px;font-weight:bold">${v}</div>
      <div style="font-size:11px;margin-top:2px">${val.toFixed(1)}</div>
    </div>`;
  }).join("");
  const mgCells=[10,15,20,25,30,35,40,45].map(v=>{
    const b1=Object.fromEntries(STATS.map(s=>[s,10]));b1[S.scalePrimary]=v;
    const b2=Object.fromEntries(STATS.map(s=>[s,10]));b2[S.scalePrimary]=v+1;
    const gain=fn?fn(b2)-fn(b1):0;
    return`<div class="bp-cell">
      <div style="color:#7a6f5a;font-size:10px">${v}→${v+1}</div>
      <div style="color:${SC[S.scalePrimary]};font-size:12px;margin-top:2px">+${Math.abs(gain).toFixed(2)}</div>
    </div>`;
  }).join("");
  return`<div>
    <div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">
      <div>
        <div class="slabel">Primary Stat</div>
        <select class="field" style="width:auto" onchange="S.scalePrimary=this.value;S.scaleDerived=Object.keys(DFN).find(d=>DRIVER[d]===this.value)||'';renderTab()">${pOpts}</select>
      </div>
      <div>
        <div class="slabel">Derived Stat</div>
        <select class="field" style="width:auto" onchange="S.scaleDerived=this.value;renderTab()">${dOpts}</select>
      </div>
    </div>
    <div class="card">
      <div class="slabel">${S.scalePrimary} → ${S.scaleDerived} (all other stats at 10)</div>
      <div class="chart-wrap">${svgLine(lineData,700,260,"stat","value",SC[S.scalePrimary],null,S.scalePrimary)}</div>
    </div>
    <div class="slabel" style="margin-bottom:6px">Breakpoints (10 → 50)</div>
    <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-bottom:14px">${bpCells}</div>
    <div class="slabel" style="margin-bottom:6px">Marginal gain per point</div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:6px">${mgCells}</div>
  </div>`;
}

// ── Tab 3: Gear Optimizer ─────────────────────────────────────────────────────
function gearOptHTML(){
  const optDriver=DRIVER[S.optDerived]||"Vitality";
  const optFn=DFN[S.optDerived];
  const optRace=RACES.find(r=>r.id===S.optRaceId);
  const fc=FC[optRace.faction];
  const baseLine=optFn?+optFn(getStats(S.optRaceId,S.optAlloc)).toFixed(3):0;
  const tgt=parseFloat(S.optTarget);
  let gearNeeded=null;
  if(!isNaN(tgt)&&optFn){
    if(baseLine>=tgt){gearNeeded=0;}
    else{for(let g=1;g<=100;g++){const gv={};gv[optDriver]=g;if(optFn(getStats(S.optRaceId,S.optAlloc,gv))>=tgt){gearNeeded=g;break;}}if(gearNeeded===null)gearNeeded=">100";}
  }
  let rOpts=RACES.map(r=>`<option value="${r.id}"${r.id===S.optRaceId?" selected":""}>${r.name} (${r.faction})</option>`).join("");
  let dOpts=Object.keys(DFN).map(d=>`<option${d===S.optDerived?" selected":""}>${d}</option>`).join("");
  let aInputs=STATS.map(s=>`<div style="display:flex;align-items:center;gap:4px">
    <span style="font-size:10px;color:${SC[s]};width:80px;flex-shrink:0">${s}</span>
    <input type="number" class="numsmall" min="0" max="40" value="${S.optAlloc[s]||0}"
      oninput="S.optAlloc['${s}']=Math.max(0,Math.min(40,+this.value||0));renderTab()"/>
  </div>`).join("");
  const chartData=Array.from({length:51},(_,i)=>i).map(g=>{const gv={};gv[optDriver]=g;const st=getStats(S.optRaceId,S.optAlloc,gv);return{stat:"+"+g,value:optFn?+optFn(st).toFixed(3):0};});
  const bpCells=[0,5,10,15,20,25,30,35,40,50].map(g=>{
    const gv={};gv[optDriver]=g;
    const val=optFn?optFn(getStats(S.optRaceId,S.optAlloc,gv)):0;
    const hit=!isNaN(tgt)&&val>=tgt;
    return`<div class="bp-cell" style="${hit?"background:rgba(74,158,106,.12);border-color:#4a9e6a55":""}">
      <div style="color:${SC[optDriver]};font-size:11px;font-weight:bold">+${g}</div>
      <div style="color:${hit?"#4a9e6a":"#e8d9a0"};font-size:11px;margin-top:2px">${val>=1000?Math.round(val).toLocaleString():val.toFixed(3)}</div>
    </div>`;
  }).join("");
  const effCells=[5,10,15,20,25,30,35,40,45,50].map(g=>{
    const gv1={};gv1[optDriver]=g-5;const gv2={};gv2[optDriver]=g;
    const gain=(optFn?optFn(getStats(S.optRaceId,S.optAlloc,gv2)):0)-(optFn?optFn(getStats(S.optRaceId,S.optAlloc,gv1)):0);
    return`<div class="bp-cell">
      <div style="color:#7a6f5a;font-size:10px">${g-5}→${g}</div>
      <div style="color:${SC[optDriver]};font-size:12px;margin-top:2px">+${gain>=100?Math.round(gain).toLocaleString():gain.toFixed(2)}</div>
    </div>`;
  }).join("");
  let resultBox="";
  if(!isNaN(tgt)&&gearNeeded!==null){
    resultBox=gearNeeded===0
      ?`<div style="color:#4a9e6a;font-size:13px;padding:8px;background:rgba(74,158,106,.1);border-radius:4px;text-align:center">Already at or above target!</div>`
      :`<div class="result-box" style="background:${fc}18;border:1px solid ${fc}40">
          <div style="font-size:11px;color:#7a6f5a;margin-bottom:2px">Gear bonus needed (${optDriver})</div>
          <div style="font-size:32px;font-weight:bold;color:${SC[optDriver]}">${gearNeeded===">100"?">100":"+"+gearNeeded}</div>
          <div style="font-size:10px;color:#7a6f5a">spread across gear slots</div>
        </div>`;
  }
  return`<div class="grid-gear">
    <div>
      <div class="card">
        <div class="slabel">Base Build</div>
        <div style="margin-bottom:10px">
          <div class="slabel">Race</div>
          <select class="field" onchange="S.optRaceId=this.value;renderTab()">${rOpts}</select>
        </div>
        <div class="slabel">Allocated Stats</div>
        <div class="grid2s" style="gap:5px">${aInputs}</div>
      </div>
      <div class="card">
        <div class="slabel">Optimization Target</div>
        <div style="margin-bottom:10px">
          <div class="slabel">Derived Stat</div>
          <select class="field" onchange="S.optDerived=this.value;S.optTarget='';renderTab()">${dOpts}</select>
        </div>
        <div style="margin-bottom:10px">
          <div class="slabel">Target Value</div>
          <input type="number" class="field" value="${S.optTarget}" placeholder="Current: ${baseLine.toLocaleString()}"
            onchange="S.optTarget=this.value;renderTab()"/>
        </div>
        <div style="background:rgba(0,0,0,.3);border-radius:6px;padding:10px 12px">
          <div class="info-row"><span style="color:#7a6f5a">Baseline (no gear)</span><span>${baseLine.toLocaleString(undefined,{maximumFractionDigits:3})}</span></div>
          <div class="info-row" style="margin-bottom:10px"><span style="color:#7a6f5a">Key driver</span><span style="color:${SC[optDriver]}">${optDriver}</span></div>
          ${resultBox}
        </div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="slabel">${S.optDerived} vs +${optDriver} gear bonus</div>
        <div class="chart-wrap">${svgLine(chartData,500,240,"stat","value",SC[optDriver],isNaN(tgt)?null:tgt,"+"+optDriver+" gear")}</div>
      </div>
      <div class="card">
        <div class="slabel">Value at key gear breakpoints</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px">${bpCells}</div>
      </div>
      <div class="card">
        <div class="slabel">Efficiency — gain per +5 ${optDriver}</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px">${effCells}</div>
      </div>
    </div>
  </div>`;
}

// ── Routing ───────────────────────────────────────────────────────────────────
let currentTab=0;
function showTab(i){
  currentTab=i;
  document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("active",i===j));
  renderTab();
}

function renderTab(){
  // Update header accent
  const race=RACES.find(r=>r.id===S.raceId);
  const fc=FC[race.faction];
  const fcRgb=hexRgb(fc);
  const hdr=document.getElementById("header");
  hdr.style.borderBottomColor=fc;
  hdr.style.background=`rgba(${fcRgb},.08)`;
  const badge=document.getElementById("faction-badge");
  badge.textContent=race.faction;badge.style.color=fc;badge.style.borderColor=fc+"44";
  document.querySelectorAll(".tab").forEach((t,i)=>{t.style.color=i===currentTab?fc:"#7a6f5a";t.style.borderBottomColor=i===currentTab?fc:"transparent";});

  const el=document.getElementById("content");
  switch(currentTab){
    case 0: el.innerHTML=buildPlannerHTML(); break;
    case 1: el.innerHTML=raceCmpHTML(); break;
    case 2: el.innerHTML=scaleHTML(); break;
    case 3: el.innerHTML=gearOptHTML(); break;
  }
}

renderTab();
</script>
</body>
</html>
